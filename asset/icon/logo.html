<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    @font-face {
        font-family: Industry;
        src: url('../fonts/LamaFont.ttf');
        font-display: block;
    }
    :root{
        --accent: hsl(120, 73%, 75%);
        font-size: 128px;
    }
    body{
        height: 100vh;
        width: 100%;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: transparent;
    }
</style>
<body>
    <div style="width: 100%; height: 100%; background-color: rgba(0,0,0,0); display: flex; justify-content: center; align-items: center;">
        <div style="width: 2rem; height: 2rem; background-color: rgba(0, 0, 0, 0);border-top: 0.5rem solid transparent; border-right: 0.5rem solid transparent; border-left: 0.5rem solid var(--accent); border-bottom: 0.5rem solid var(--accent); box-sizing: content-box; margin-right: 0.5rem; display: flex; justify-content: center; align-items: center; aspect-ratio: 1/1;">
            <div style="width: 1rem; height: 1rem; background-color: var(--accent); box-sizing: content-box; display: flex; justify-content: center; align-items: center;">
            </div>
        </div>
        <p style="font-size: 1rem;  margin: 0; font-family: 'Industry'; text-align: left;">LAMA<br>Group</p>
    </div>
    
</body>
</html>
