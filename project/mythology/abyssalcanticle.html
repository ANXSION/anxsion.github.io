<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Canticle</title>
    <style>
    @font-face {
        font-family: Ancient;
        src: url('../../asset/fonts/SFNY.otf');
        font-display: swap;
    }
    body{
        background-color: black;
        background: linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.7)), url(./arts/aeolia.jpg);
        color: white;
        font-family: Ancient;
        font-size: 17px;
        line-height: 22px;
        min-height: 100vh;
        background-size: cover;
        background-attachment: fixed;
        background-position: 50% 50%;

    }
    .header{
        font-size: 2rem;
        line-height: 3rem;
        font-weight: normal;
        width: 100%;
        text-align: center;
    }
    p{
        font-size: 1rem;
        line-height: 2rem;
    }
    .storyContainer{
        display: grid;
        grid-template-columns: 1fr 1fr;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding-left: 10%;
        padding-right: 10%;
        gap: 9px;
    }
    .storyBox{
        width: 100%;
        aspect-ratio: 18/9;
        display: flex;
        justify-content: center;
        align-items: center;
        background-size: cover; 
        background-repeat: no-repeat;
        border-radius:22px;
    }
    .storyName{
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
        margin: 0;
    }
    @media screen and (max-width: 420px) {
        .storyContainer{
            grid-template-columns: 1fr;
        }
    }
    </style>
</head>
<body>
    <main>
        <h1 class="header">Abyssal Canticle</h1>

        <div class="storyContainer">
            <div class="storyBox" style="background: url(./arts/PortCityOfLyriax.jpg);  background-position: 0 50%; background-size: cover; ">
                <p class="storyName">Port City of Lyriax</p>
            </div>
            <div class="storyBox" style="background: url(./arts/TheAridSeaOfAlKara.jpg);  background-position: 0 50%; background-size: cover; ">
                <p class="storyName">The Arid Sea of Al'Kara</p>
            </div>
            <div class="storyBox" style="background: url(./arts/TheTamsinDunes.jpg);  background-position: 0 50%; background-size: cover; ">
                <p class="storyName">The Tamsin Dunes</p>
            </div>
            <div class="storyBox" style="background: url(./arts/DoriansHowlingShores.jpg);  background-position: 0 10%; background-size: cover; ">
                <p class="storyName">Dorian's Howling Shores</p>
            </div>
            <div class="storyBox" style="background: url(./arts/FenOfYsara.jpg);  background-position: 0 50%; background-size: cover; ">
                <p class="storyName">Fen of Ysara</p>
            </div>
            <div class="storyBox" style="background: url(./arts/SeraphinesLookout.jpg);  background-position: 0 50%; background-size: cover; ">
                <p class="storyName">Seraphine's Lookout</p>
            </div>
            <div class="storyBox" style="background: url(./arts/HollowOfEldrin.jpg);  background-position: 0 50%; background-size: cover; ">
                <p class="storyName">Hollow of Eldrin</p>
            </div>
            <div class="storyBox" style="background: url(./arts/AsurasForge.jpg);  background-position: 0 20%; background-size: cover; ">
                <p class="storyName">Asura's Forge</p>
            </div>
            <div class="storyBox" style="background: url(./arts/WhereTimeStoodStill.jpg);  background-position: 0 50%; background-size: cover; ">
                <p class="storyName">Where Time Stood Still</p>
            </div>
            <div class="storyBox" style="background: url(./arts/GlacicalCradleOfElara.jpg);  background-position: 0 20%; background-size: cover; ">
                <p class="storyName">Glacial Cradle of Elara</p>
            </div>
            <div class="storyBox" style="background: url(./arts/AnyasBastionOnMistveilLake.jpg);  background-position: 0 30%; background-size: cover; ">
                <p class="storyName">Anya's Bastion on Mistveil Lake</p>
            </div>
            
        </div>
    </main>
    
    <footer>

    </footer>
</body>
</html>
