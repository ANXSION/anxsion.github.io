<body>
    <nav style="display: flex; justify-content: center; align-items: center; height: 100%;">

                </div>
            </div>
            <p style="font-size: 18px;  margin: 0; font-family: 'Industry'; text-align: left;">LAMA<br>AI Systems</p>
    </nav>

    <div style="width: 100%; height: 18px; display: flex; justify-content: center; align-items: center;">
        <p style="font-size: 12px; font-family: MainFont;" id="version"></p>
    </div>

    <main style="position: relative; width: 100%; height: 100%;">
        <div style="display: flex; flex-direction: column; min-height: 50vh; padding-bottom: 138px; box-sizing: border-box; padding-left: 10%; padding-right: 10%;" id="outputPanel">

        </div>

        <div style="display: flex;  justify-content: center; align-items: center; height: 120px; width: 100%; position: fixed; bottom: 0; left: 0; box-sizing: border-box; background-color: var(--primary);">

            <div style="display: grid; grid-template-columns: 1fr max-content; background-color: var(--overlay); padding: 9px; box-sizing: border-box; border-radius: 22px; gap: 9px; height: 70%; justify-content: center; align-items: center; width: 100%; margin-left: 10%; margin-right: 10%; border: 2px solid var(--secondary);">
                <textarea id="inputPanel" placeholder="Chat with Hades" rows="2"></textarea>                
                <button id="generate" onclick="execute()"><p class="material-symbols-outlined">send</p></button>
                
            </div>
        </div>
    </main>

        <script>
            document.getElementById('version').innerText = 'Hades v0.0.1a'
        </script>

        <script>
            async function query(data) {
            const response = await fetch(
                "https://api-inference.huggingface.co/models/mistralai/Mixtral-8x22B-Instruct-v0.1",
                {
                    headers: { Authorization: "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" },
                    method: "POST",
                    body: JSON.stringify(data),
                }
            );
             
            const result = await response.json();
            return result;
        }

        query({"inputs": "Can you please let us know more details about your "}).then((response) => {
            console.log(JSON.stringify(response));
        });

            const model = tf.sequential();
            model.add(tf.layers.dense({units: 1, inputShape: [1]}));
            model.compile({optimizer: 'sgd', loss: 'meanSquaredError'});

            let xs = tf.tensor1d([-1.0, 0.0, 1.0, 2.0, 3.0, 4.0]);
            let ys = tf.tensor1d([-3.0, -1.0, 1.0, 3.0, 5.0, 7.0]);

            model.fit(xs, ys, {epochs:500});
            

            async function aisystem(rawdata){
                let processedData = tf.tensor1d([rawdata])
                return await model.predict(processedData);
            }

            
            async function execute(){
                let tacticaldata = parseFloat(document.getElementById('inputPanel').value);
                let p = document.createElement('p');

                if(tacticaldata == ''){
                    return
                }
                else{
                    document.getElementById('outputPanel').insertAdjacentHTML("beforeend", `
                    <div class="userInputWrapper">
                        <p class="userInput">`+tacticaldata+`</p>
                    </div>
                    `);

                    document.getElementById('outputPanel').scrollIntoView({ behavior: "smooth", block: "end", inline: "nearest" });
                    p.innerText = await aisystem(tacticaldata);
                    document.getElementById('outputPanel').appendChild(p);
                    p.scrollIntoView({ behavior: "smooth", block: "start", inline: "nearest" });
                    
                }
            }
            
        </script>
