<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Res Sacrae Capital</title>
    <style>
        @font-face {
            font-family: 'Capital';
            src: url('../../asset/fonts/CinzelDecorative.ttf');
            font-display: swap;
        }
        body{
            background-color: black;
            color: white;
            font-size: 18px;
            font-family: 'Roboto';
        }
        nav{
            margin-bottom: 27px;
        }
        h1, h2{
            width: 100%;
            text-align: center;
            margin-top: 27px;
            margin-bottom: 27px;
            font-weight: normal;
        }
        p{
            font-size: 16px;
            padding: 0;
            margin: 0;
            margin-top: 6px;
            margin-bottom: 6px;
            color: white;
        }
        p[change ='rise']{
            color:rgb(0, 255, 0);
        }
        p[change ='fall']{
            color:orangered;
        }
        p[change ='none']{
            color:white;
        }
        #glanceDataContainer{
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            justify-content: center;
            align-items: center;
            grid-gap: 9px;
            text-align: center;
        }
        .glanceData{
            width: 100%;
            display: grid;
            grid-gap: 9px;
            grid-template-columns: 1fr 1fr 1fr;
            justify-content: start;
            align-items: start;
            text-align: left;
        }
        .glanceDataActual{
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: left;
        }
        .ticker{
            width: 100%;
            display: flex;
            overflow: hidden;
            user-select: none;
        }
        .ticker p{
            margin: 0;
            width: 100%;
            display: flex;
            margin-block: 0;
            transform: translate3d(100%, 0, 0);
            justify-content: center;
            align-items: center;
            animation: ticking ;
        }
        @keyframes ticking{
            0%{
                transform: translate3d(100%,0,0);
            }
            100%{
                transform: translate3d(-100%,0,0);
            }
        }
    </style>
</head>
<body>
    <nav>
        <p style="font-size: 1.5rem;  margin: 0; font-family: 'Capital'; text-align: center;">Res Sacrae<br>Capital</p>
    </nav>

    <div class="ticker">
        <p>This site is under development.</p>
    </div>

    <h1>Economy</h1>

    

    <div id="glanceDataContainer">

    </div>
    

    <script>
        //metric-current-old
        let glanceDataset=[
            ['Gross National Product', 170.344, 156.813, 'T'],
            ['GN Capital Formation', 14.72, 14.349, 'T'],
            ['Real GDP', 43.72, 41.856, ''],
            ['Gross Domestic Product', 3.417, 3.15, '%'],
            ['GDP Growth', 8.4, 8.1, '%'],

            ['Population', 1.374, 1.361, 'B'],
            ['GN Capital Formation', 14.72, 14.349, 'T'],
            ['Real GDP', 43.72, 41.856, ''],
            ['Gross Domestic Product', 3.417, 3.15, '%'],
            ['GDP Growth', 8.4, 8.1, '%'],
        ];

        let changeData, changeValue, symbol = '';

        for (i=0; i< glanceDataset.length; i++){
            symbol='+';
            changeData = 'rise';
            changeValue = parseFloat(glanceDataset[i][1] - glanceDataset[i][2]).toFixed(2);
            if (changeValue > 0){
                changeData = 'rise';
                symbol = '+';
            }
            else if (changeValue < 0){
                changeValue = Math.abs(changeValue);
                changeData = 'fall';
                symbol = '-';
            }
            else{
                changeData = 'none';
                symbol = '+';
            }
            document.getElementById('glanceDataContainer').insertAdjacentHTML("beforeend",
                `
                <div class="glanceData">
                    <p class="glanceDataActual">`+ glanceDataset[i][0] +`</p>
                    <p class="glanceDataActual">`+ glanceDataset[i][1]  +" "+ glanceDataset[i][3] +`</p>
                    <p class="glanceDataActual" change ="`+changeData+`" >`+ symbol + changeValue +" "+ glanceDataset[i][3] +`</p>
                </div>
                `
            );
        }
    </script>
</body>
</html>
