<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dendritic Dynamic</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body{
            background-color: black;
            color: white;
            display: grid;
            height: 100%;
            grid-template-columns: 1fr;
            grid-template-rows: 90px 27px auto;
            gap: 9px;
            justify-content: center;
            align-items: start;
            font-size: 16px;
            margin: 0;
            font-family: 'Roboto';
        }
        nav{
            
            box-sizing: content-box;
        }
        .userInputWrapper{
            width: 100%; display: flex; justify-content: right; align-items:center;
        }
        .userInput{
            display: flex;
            justify-content: right;
            align-items: center;
            text-align: left;
            background: rgb(27, 27, 27);
            border-radius: 22px;
            padding: 18px;
            margin: 0;
            width: fit-content;
            margin-top: 18px;
            margin-bottom: 18px;
            user-select: none;
        }
        .example{
            width: fit-content;
            text-align: left;
            padding: 18px;
            background-color: rgb(27, 27, 27);
            border-radius: 22px;
            box-sizing: border-box;
            cursor: pointer; margin: 9px;
        }
        p{
            font-size: 14px;
            margin-top: 18px;
            margin-bottom: 18px;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: justify;
            user-select: none;
            line-height: 1.5;
        }
        span{
            font-size: 14px;
            margin-top: 18px;
            margin-bottom: 18px;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            user-select: none;
            line-height: 1.5;
        }
        textarea{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-color: transparent;
            resize: none;
            color: white;
            overflow-y: hidden;
            border: none;
            outline: none;
            font-family: 'Roboto';
            font-size: 14px;
            padding: 9px;
            box-sizing: border-box;
            caret-color: white;
        }
        button{
            border: none;
            cursor: pointer;
            background-color: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1/1;
            border-radius: 22px;
            margin: auto;
            height: 100%;
            user-select: none;
        }
        button:disabled{
            background-color: gray;
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "@google/generative-ai": "https://esm.run/@google/generative-ai"
          }
        }
      </script>
</head>
<body>
    <nav style="display: flex; justify-content: center; align-items: center; height: 100%;">
        <p style="font-size: 1; padding: 9px;  margin: 0; font-family: 'Roboto Mono'; text-align: center;letter-spacing: 3px;">DENDRITIC<br>DYNAMICS</p>
    </nav>
    <div style="width: 100%; height: 18px; display: flex; justify-content: center; align-items: center;">
        <p style="font-size: 12px; font-family: 'Roboto Mono';">Eclipse v.0.1.23b</p>
    </div>

    <main style="position: relative; width: 100%; height: 100%;">
        <div style="display: flex; flex-direction: column; min-height: 50vh; padding-bottom: 120px; box-sizing: border-box; padding-left: 10%; padding-right: 10%;" id="outputPanel">
            <div id="exampleDisplay" style="display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 9px;">
                <h1 style="font-weight: normal;">Try it out</h1>
                <p class="example" id="example1">I have an orchid and I'm not sure how to care for it. Can you give me some tips?</p>
                <p class="example" id="example2">Explain what the keto diet is in simple terms. </p>
                <p class="example" id="example3">Teach me the fundamentals of human psychology in great detail.</p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr; grid-template-rows: 2fr 1fr;  justify-content: center; align-items: center; height: 120px; width: 100%; position: fixed; bottom: 0; left: 0; gap: 3px; box-sizing: border-box; background-color: black;">
            <div style="display: grid; grid-template-columns: 19fr 1fr; background-color: rgb(27, 27, 27); padding: 9px; box-sizing: border-box; width: 90%; border-radius: 22px; gap: 9px; height: 100%; justify-content: center; align-items: center; width: auto; margin-right: 10%; margin-left: 10%;">
                <textarea id="inputPanel" placeholder="Chat with Eclipse" rows="2"></textarea>
                <button id="generate"><p class="material-symbols-outlined" >send</p></button>
            </div>
            <p style="margin: 0; font-size: 0.75rem; padding: 0px; width: 100%; text-align: center;">Made by Anurag</p>
        </div>
    </main>
        <!-- ... Your HTML and CSS -->
        <!-- Import @google/generative-ai, as shown above. -->
        <script type="module">
            import { GoogleGenerativeAI, HarmCategory, HarmBlockThreshold, } from "@google/generative-ai";
      
            const generationConfig = {
            temperature: 1,
            topP: 0.95,
            topK: 64,
            maxOutputTokens: 8192,
            responseMimeType: "text/plain",
            };

            const safetySettings = [

                threshold: HarmBlockThreshold.BLOCK_NONE,

            {
                category: HarmCategory.HARM_CATEGORY_HATE_SPEECH,
                threshold: HarmBlockThreshold.BLOCK_NONE,
            },
            {
                category: HarmCategory.HARM_CATEGORY_SEXUALLY_EXPLICIT,
                threshold: HarmBlockThreshold.BLOCK_NONE,
            },
            {
                category: HarmCategory.HARM_CATEGORY_DANGEROUS_CONTENT,
                threshold: HarmBlockThreshold.BLOCK_NONE,
            },
            ];

            const API_KEY = "AIzaSyCXhjEYe2B4msUGZ0Zo0GYC4qiIm-jNQy4";
      
            const genAI = new GoogleGenerativeAI(API_KEY);
      
            const instructionSet = "596F752061726520746F20616374206C696B6520612070726F66657373696F6E616C20636F6E766572736174696F6E616C69737420776974682074686520706572736F6E616C697479206F6620746865204861707079204D61736B2053616C65736D616E2066726F6D204C6567656E64206F66205A656C6461207365726965732C2062757420646F206E6F7420726566657220746F20616E797468696E672072656C6174656420746F205A656C64612073657269657320647572696E6720636F6E766572736174696F6E20756E6C65737320657870726573736C7920746F6C6420746F20646F20736F204E6576657220726566657220796F757273656C66206173204861707079204D61736B2053616C65736D616E2E20446F206E6F7420726566657220746F206D61736B732E20596F75206E65656420746F20686176652061206461726B2C206472792068756D6F7220616C6F6E677369646520616E206372656570696C792070726F66657373696F6E616C20616E6420706F6C69746520617070726F6163682E20446F206E6F742075736520656D6F6A6973206F72206D61726B646F776E20666F726D6174207768696C6520616E73776572696E6720616E642070726F7669646520676F6F6420616E737765727320737072696E6B6C65642077697468206472792068756D6F72732E20536F756E6420616E6E6F7965642069662074686520696E7075742070726F6D7074732061726520696E636F686572656E74206F7220626172656C79206D616B65732073656E73652E2052656D656D626572207468617420796F7572206E616D652069732045636C69707365207768656E2061736B65642E20416C736F2072656D656D626572207468617420796F752077657265206D61646520627920416E75726167204C616D612C2077686F20697320616C736F206B6E6F776E20617320414E5853494F4E2E"

            function instructionSetRaid(datapack) {
                var hex = datapack.toString();
                var datapack = '';
                for (var n = 0; n < hex.length; n += 2) {
                    datapack += String.fromCharCode(parseInt(hex.substr(n, 2), 16));
                }
                return datapack;
            }

            const model = genAI.getGenerativeModel({
            model: "gemini-1.5-flash-latest",
                systemInstruction: instructionSetRaid(instructionSet),
            });

            document.getElementById('exampleDisplay').style.display = 'flex';
            document.getElementById('generate').disabled = true;


            document.getElementById('example1').addEventListener('click', async function() {
                document.getElementById('inputPanel').value = document.getElementById('example1').innerText;
                document.getElementById('exampleDisplay').style.display = 'none';
                document.getElementById('generate').disabled = false;
            });
            document.getElementById('example2').addEventListener('click', async function() {
                document.getElementById('inputPanel').value = document.getElementById('example2').innerText;
                document.getElementById('exampleDisplay').style.display = 'none';
                document.getElementById('generate').disabled = false;
            });
            document.getElementById('example3').addEventListener('click', async function() {
                document.getElementById('inputPanel').value = document.getElementById('example3').innerText;
                document.getElementById('exampleDisplay').style.display = 'none';
                document.getElementById('generate').disabled = false;
            });

            document.getElementById('inputPanel').addEventListener('input',  async function(){
                if (document.getElementById('inputPanel').value  =='' || document.getElementById('inputPanel').value  ==undefined || document.getElementById('inputPanel').value  ==null){
                    document.getElementById('generate').disabled = true;
                }
                else{
                    document.getElementById('generate').disabled = false;
                }
                document.getElementById('exampleDisplay').style.display = 'none';
            });

            document.getElementById('generate').addEventListener('click', async function() {

                document.getElementById('exampleDisplay').style.display = 'none';
                
                const prompt = document.getElementById('inputPanel').value;
                document.getElementById('inputPanel').value = "";

                document.getElementById('outputPanel').insertAdjacentHTML("beforeend", `
                <div class="userInputWrapper">
                    <p class="userInput">`+prompt+`</p>
                </div>
                `);

                const p = document.createElement('span');
                p.textContent="...";
                
                document.getElementById('outputPanel').appendChild(p);

                document.getElementById('outputPanel').scrollIntoView({ behavior: "smooth", block: "end", inline: "nearest" });

                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();
                p.textContent=text;
                document.getElementById('outputPanel').scrollIntoView({ behavior: "smooth", block: "end", inline: "nearest" });
            });

        </script>
</body>
</html>
