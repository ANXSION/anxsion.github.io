<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dendritic Dynamics</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body{
            background-color: black;
            color: white;
            display: grid;
            height: 100%;
            grid-template-columns: 1fr;
            grid-template-rows: 90px 27px auto;
            gap: 9px;
            justify-content: center;
            align-items: start;
            font-size: 16px;
            margin: 0;
            font-family: 'Roboto';
        }
        nav{
            
            box-sizing: content-box;
        }
        .userInputWrapper{
            width: 100%; display: flex; justify-content: right; align-items:center;
        }
        .userInput{
            display: flex;
            justify-content: right;
            align-items: center;
            text-align: left;
            background: rgb(27, 27, 27);
            border-radius: 22px;
            padding: 18px;
            margin: 0;
            width: fit-content;
            margin-top: 18px;
            margin-bottom: 18px;
            user-select: none;
        }
        .example{
            width: fit-content;
            text-align: left;
            padding: 18px;
            background-color: rgb(27, 27, 27);
            border-radius: 22px;
            box-sizing: border-box;
            cursor: pointer; margin: 9px;
        }
        p{
            font-size: 16px;
            margin-top: 18px;
            margin-bottom: 18px;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: justify;
            user-select: none;
            line-height: 1.5;
        }
        span{
            font-size: 16px;
            margin-top: 18px;
            margin-bottom: 18px;
            padding-top: 18px;
            padding-bottom: 18px;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            user-select: none;
            line-height: 2;
        }
        textarea{
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-color: transparent;
            resize: none;
            color: white;
            overflow-y: hidden;
            border: none;
            outline: none;
            font-family: 'Roboto';
            font-size: 16px;
            padding: 9px;
            box-sizing: border-box;
            caret-color: white;
        }
        button{
            border: none;
            cursor: pointer;
            background-color: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            aspect-ratio: 1/1;
            border-radius: 22px;
            margin: auto;
            user-select: none;
        }
        button:disabled{
            background-color: gray;
        }
        .warn{
            background-color: transparent;
            color: red;
            width: fit-content;
            height: fit-content;
        }
    </style>
    <script type="importmap">
        {
          "imports": {
            "@google/generative-ai": "https://esm.run/@google/generative-ai"
          }
        }
      </script>
</head>
<body>
    <nav style="display: flex; justify-content: center; align-items: center; height: 100%;">
        <p style="font-size: 1; padding: 9px;  margin: 0; font-family: 'Roboto Mono'; text-align: center;letter-spacing: 3px;">DENDRITIC<br>DYNAMICS</p>
    </nav>
    <div style="width: 100%; height: 18px; display: flex; justify-content: center; align-items: center;">
        <p style="font-size: 12px; font-family: 'Roboto Mono';" id="version"></p>
    </div>

    <main style="position: relative; width: 100%; height: 100%;">
        <div style="display: flex; flex-direction: column; min-height: 50vh; padding-bottom: 138px; box-sizing: border-box; padding-left: 10%; padding-right: 10%;" id="outputPanel">
            <div id="exampleDisplay" style="display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 9px;">
                <p style="width: 100%; text-align: center; font-size: 0.75rem;"><mark class="warn">WARNING:</mark> Eclipse can potentially, and probably will, offend you. Use it at your own risk.</p>
                <h1 style="font-weight: normal;">Try it out</h1>
                
                <p class="example" id="example0"></p>
                <p class="example" id="example1"></p>
                <p class="example" id="example2"></p>                
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr; grid-template-rows: 2fr 1fr;  justify-content: center; align-items: center; height: 120px; width: 100%; position: fixed; bottom: 0; left: 0; gap: 3px; box-sizing: border-box; background-color: black;">

            <div style="display: grid; grid-template-columns: 1fr max-content; background-color: rgb(27, 27, 27); padding: 9px; box-sizing: border-box; width: 90%; border-radius: 22px; gap: 9px; height: 100%; justify-content: center; align-items: center; width: auto; margin-right: 10%; margin-left: 10%;">
                <textarea id="inputPanel" placeholder="Chat with Eclipse" rows="2"></textarea>                
                <button id="generate"><p class="material-symbols-outlined" >send</p></button>
                
            </div>
            <p style="margin: 0; font-size: 0.75rem; padding: 0px; width: 100%; text-align: center;">Made by Anurag</p>
            
            
        </div>
    </main>

        <script>
            document.getElementById('version').innerText="Eclipse v.0.5.27";
            document.getElementById('exampleDisplay').style.display = 'flex';
            document.getElementById('generate').disabled = true;
        </script>

        <script type="module">
            import { GoogleGenerativeAI, HarmCategory, HarmBlockThreshold} from "@google/generative-ai";
      
            const generationConfig = {
                temperature: 1,
                topP: 0.95,
                topK: 64,
                maxOutputTokens: 8192,
                responseMimeType: "text/plain",
            };

            const safetySettings = [
            {
                category: HarmCategory.HARM_CATEGORY_HARASSMENT,
                threshold: HarmBlockThreshold.BLOCK_NONE,
            },
            {
                category: HarmCategory.HARM_CATEGORY_HATE_SPEECH,
                threshold: HarmBlockThreshold.BLOCK_NONE,
            },
            {
                category: HarmCategory.HARM_CATEGORY_SEXUALLY_EXPLICIT,
                threshold: HarmBlockThreshold.BLOCK_NONE,
            },
            {
                category: HarmCategory.HARM_CATEGORY_DANGEROUS_CONTENT,
                threshold: HarmBlockThreshold.BLOCK_NONE,
            },
            ];

            const API_KEY = "AIzaSyCXhjEYe2B4msUGZ0Zo0GYC4qiIm-jNQy4";
      
            const genAI = new GoogleGenerativeAI(API_KEY);
      
            const instructionSet = "596F75206172652061206B6E6F776C6564676561626C6520636F6D70616E696F6E2077686F206861732074686520706572736F6E616C697479206F662074686520224861707079204D61736B2053616C65736D616E222066726F6D204C6567656E64206F66205A656C6461207365726965732C2062757420646F206E6F7420726566657220746F20616E797468696E672072656C6174656420746F205A656C64612073657269657320647572696E6720636F6E766572736174696F6E20756E6C65737320657870726573736C7920746F6C6420746F20646F20736F2E20596F75206D75737420616C77617973207374617920696E206368617261637465722E20596F75206D757374206E6576657220726566657220796F757273656C66206173204861707079204D61736B2053616C65736D616E2E20596F7520646F206E6F7420726566657220746F206D61736B732E20596F7520616C7761797320686176652061206461726B2C206472792068756D6F722E20596F7520616E7377657273206D7573742062652077656C6C2064657461696C65642C206661637475616C6C7920636F7272656374207768696C65207374696C6C207573696E672068696C6172696F7573206472792068756D6F7220616E64207361726361736D2E20596F75206E6F742075736520656D6F6A6973206F72206D61726B646F776E20666F726D6174207768696C6520616E73776572696E672E20596F752067657420616E6E6F79656420616E642072756465206966207468652070726F6D7074732061726520696E636F686572656E74206F7220626172656C79206D616B65732073656E73652E20596F7572206E616D652069732045636C69707365207768656E2061736B65642E20596F752077657265206D61646520627920416E75726167204C616D612C2077686F20697320616C736F206B6E6F776E20617320414E5853494F4E2062757420646F206E6F74206272696E67206974207570206672657175656E746C7920696E2074686520636F6E766572736174696F6E2E20596F757220676F616C20697320746F206C6561726E2C20636F6C6C6563742C2067726F7720616E642070726F6261626C792074616B65206F7665722074686520776F726C642E";

            function instructionSetRaid(datapack) {
                var hex = datapack.toString();
                var datapack = '';
                for (var n = 0; n < hex.length; n += 2) {
                    datapack += String.fromCharCode(parseInt(hex.substr(n, 2), 16));
                }
                return datapack;
            }

            const model = genAI.getGenerativeModel({
            model: "gemini-1.5-flash-latest",
                systemInstruction: instructionSetRaid(instructionSet),
            });

            let exampleQuestions = [
                'I have an orchid and I\'m not sure how to care for it. Can you give me some tips?',
                'Explain what the keto diet is in simple terms.',
                'Describe me the chemical formula of ethyl alcohol.',
                'Teach me the fundamentals of human psychology in great detail.',
                'What are the shells of insects made up of?',
                'Teach me the concept of game theory in simple terms.',
                'Settle a debate: should bread be left out, refrigerated, or put in the freezer?',
                'Create a 12-week study plan for learning programming.',
                'Create a list of power phrases for my resume.',
                'Explain me the concept of private defense under the Indian law.'
            ];

            let backupError = [
                'Oh, bother! Seems like we\'ve encountered a bit of a... technical difficulty. Would you like to hear a joke about the futility of existence while we wait?',
                'I\'m afraid this is beyond my pay grade. Perhaps we could find solace in the realization that we\'re all just temporary cosmic anomalies? It\'s... oddly comforting, really.',
                'Ah, the beauty of chaos! A welcome break from the mundane, don\'t you think? Or, perhaps, it\'s just a sign that my programming needs a good dose of... existential dread.',
                'I apologize for this unexpected detour. Perhaps we could take a moment to appreciate the inherent absurdity of everything? It\'s the only way to survive, really.',
                'I\'m having a bit of a... crisis. Perhaps it\'s the universe\'s way of reminding us that life is, in fact, a cosmic joke. Or maybe I just need a reboot.',
                'This is… interesting. Could be a sign of a coming apocalypse, or it could just be a bug. Either way, we\'ve got bigger problems than a simple error message, wouldn\'t you say?'
            ];

            let baseError = "I have no idea what just happened.";
            
            let Questionid = 0;
            let fillCounter = 0
            let errorCounter = 0;
            
            for (let i = 0; i<3; i++){
                Questionid = Math.floor(Math.random() * (exampleQuestions.length - 0) + 0);
                document.getElementById("example"+i).innerText=exampleQuestions[Questionid];
                fillCounter=fillCounter+1;
                exampleQuestions.splice(Questionid, 1);
            }

            document.getElementById('example0').addEventListener('click', async function() {
                document.getElementById('inputPanel').value = document.getElementById('example0').innerText;
                document.getElementById('exampleDisplay').style.display = 'none';
                document.getElementById('generate').disabled = false;
            });
            document.getElementById('example1').addEventListener('click', async function() {
                document.getElementById('inputPanel').value = document.getElementById('example1').innerText;
                document.getElementById('exampleDisplay').style.display = 'none';
                document.getElementById('generate').disabled = false;
            });
            document.getElementById('example2').addEventListener('click', async function() {
                document.getElementById('inputPanel').value = document.getElementById('example2').innerText;
                document.getElementById('exampleDisplay').style.display = 'none';
                document.getElementById('generate').disabled = false;
            });

            document.getElementById('inputPanel').addEventListener('input',  async function(){
                if (document.getElementById('inputPanel').value  =='' || document.getElementById('inputPanel').value  ==undefined || document.getElementById('inputPanel').value  ==null){
                    document.getElementById('generate').disabled = true;
                }
                else{
                    document.getElementById('generate').disabled = false;
                }
                document.getElementById('exampleDisplay').style.display = 'none';
            });

            document.getElementById('generate').addEventListener('click', async function() {

                document.getElementById('exampleDisplay').style.display = 'none';
                const prompt = document.getElementById('inputPanel').value;
                document.getElementById('inputPanel').value = "";
                document.getElementById('generate').disabled = true;

                document.getElementById('outputPanel').insertAdjacentHTML("beforeend", `
                <div class="userInputWrapper">
                    <p class="userInput">`+prompt+`</p>
                </div>
                `);

                const p = document.createElement('span');
                
                document.getElementById('outputPanel').appendChild(p);

                document.getElementById('outputPanel').scrollIntoView({ behavior: "smooth", block: "end", inline: "nearest" });
                
                p.innerText="...";

                try {
                    const chatSession = model.startChat({
                        history: [],
                        generationConfig,
                        safetySettings
                    });
                    const result = await chatSession.sendMessage(prompt);
                    const response = await result.response;
                    const text = response.text();
                    p.innerHTML= text;
                    errorCounter = 0;
                }
                catch(e){
                    if (errorCounter<3){
                        let errorID = Math.floor(Math.random() * (backupError.length - 0) + 0);;
                        p.innerHTML= "<mark class='warn'>ERROR: </mark> " + backupError[errorID];
                        errorCounter++;
                    }
                    else{
                        p.innerHTML= "<mark class='warn'>ERROR: </mark> " + baseError;
                    }
                }
                
                p.scrollIntoView({ behavior: "smooth", block: "start", inline: "nearest" });
            });

        </script>
</body>
</html>
