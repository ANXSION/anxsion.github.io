<!DOCTYPE html>

        nav{
            width: 100%; display: flex; justify-content: center; align-items: center; padding-top: 18px; padding-bottom: 27px;

            width: 100%;

            flex-direction: column;

        }
        .actContainer{

            display: grid;
            grid-template-columns: 1fr 1fr 1fr;

        }
        a{
            text-align: left;
            color: black;
            margin: 18px;

            margin-right: 18px;
        }

        @media screen and (max-width: 425px) {
            .actContainer{
                display: flex;
                flex-direction: column;
            }
            
        }
