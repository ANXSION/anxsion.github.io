<style>
.body {
width:100%;
height: 100%;
margin: 0;
font-size:16px;
font-family:Consolas, "Andale Mono", "Lucida Console", "Lucida Sans Typewriter", Monaco, "Courier New", "monospace";
font-display:swap;
position: relative;
-webkit-tap-highlight-color:transparent;
user-select: text;
-webkit-user-select: text;
-moz-user-select: text;
overflow: visible;
transition: 0.7s ease;
scroll-behavior: smooth;
min-height: 100%;
min-width: 360px;
}
::selection {
  background:#86DC3D;
  color:white;
}
.banner{
top:0;
margin-top:3px;
height: auto;
width: 20%;
}
.Nav{
background: white;
font-size: 34px;
}
.sidenav {
padding-top: 4.8%;
height: 150%;
width: 100%;
z-index: 2;
background-color: white;
color:black;
position: fixed;
top: 0;
left:0;
transition: 0.5s ease;
visibility:hidden;
opacity: 0;
}
.sidenav p{
margin-top: 0px;
color:black;
font-size: 40px;
}
.sidenav a {
font-family:Consolas, "Andale Mono", "Lucida Console", "Lucida Sans Typewriter", Monaco, "Courier New", "monospace";
margin-top: 40px;
padding: 8px;
text-decoration: none;
color: black;
display: block;
font-size: 32px;
transition: 0.3s ease;
}
.sidenav a:hover {
color: #86DC3D;
}
.sidenav p:hover {
  color: #86DC3D;
}
.openBtn{
cursor: pointer;
transition: 0.5s;
}
.openBtn:hover{
color: #86DC3D;
}
.closebtn {
cursor: pointer;
top: 0px;
color: white;
font-size: 36px;
transition: 0.5s;
}
.closebth:hover{
color:#86DC3D;
}
::-webkit-scrollbar {
width: 8px;
} 
::-webkit-scrollbar-track {
background: black;
}
::-webkit-scrollbar-thumb {
background: #86DC3D;
}
footer{
  height: 40px;
  padding-bottom: 5px;
  background-color: white;
  width: 100%;
  position: fixed;
  bottom: 40px;
}
@media screen and (max-width: 480px) {
  .sidenav a {
  font-size: 30px;
  }
  }
@media screen and (min-width: 769px) {
.banner{
width: 18%;
}
.sidenav{
padding-top: 4.5%;
}
}
</style>
</head>

<body id="body" class="body">

	<div align="center">
		<img class="banner" src="img/banner.webp" width="3000" height="750" alt="Brand">
	</div>

	<div id="mySidenav" class="sidenav">
		<div align="center">
			<p href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</p>
			<a href="app/page/index.html">.Home</a>

	</div>

<nav Class ="Nav" align="center">

</nav>

	<br>

	<footer align="center">
		<p><strong>AnxSion &copy; 2021</strong></p>
		<p>All Rights Reserved.</p>
	</footer>
	
	<script>
		function openNav() {
			document.getElementById("mySidenav").style.visibility = "visible";
			document.getElementById("mySidenav").style.opacity = "1";
		}

		function closeNav() {
			document.getElementById("mySidenav").style.visibility = "hidden";
			document.getElementById("mySidenav").style.opacity = "0";
		}
	</script>
</body>
</html>
