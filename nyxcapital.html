<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyx Capital</title>
</head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body{
        min-width: 100%;
        min-height: 100vh;
        background-color: white;
        display: flex;
        flex-direction: column;
        justify-content: start;
        align-items: center;
        font-family: 'Times New Roman';
        color: black;
        font-size: 16px;
        line-height: 1.5;
        margin: 0;
    }
    nav{
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        background-color: white;
    }

    div{
        width: 100%;
    }

    p{
        font-size: 1rem;
    }
    h1,h2,h3,h4,h5,h6{
        font-weight: normal;
    }
    
    @media (max-width: 424px){
        p{
            font-size: 0.75rem;
        }        
    }
</style>

<body>

  <nav>
    <p style="font-size: 1.7rem; border: 3px black solid; padding: 9px;">Nyx Capital</p>
  </nav>

    <div style="width: 90%;">
        <h1>Current Economy</h1>
        <div>
            <canvas id="myChart"></canvas>
        </div>
        <h1>Portfolio Ratios</h1>
        

        <h1>About</h1>
        <p>Nyx Capital is a private market research / analysis initative to provide consistent market report and data for everyone.</p>

        
    </div>
    <footer>
        <p style="display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 9px;">&copy; Nyx Capital</p>
    </footer>

    <script>
        var lineChart = 'line';
        var pieChart = 'pie';
      
        var linechartdata = {
            labels: ['January', 'February', 'March', 'April', 'May', 'June'],
            datasets: [{
              label: 'AAPL',
              data: [12, 19, 3, 5, 2, 3],
              borderColor: 'rgb(0,0,0)',
              borderWidth: 1
            }]
        };

        new Chart(document.getElementById('myChart'),{
          type: lineChart,
          data: linechartdata
        }
        );

        

      </script>
</body>
</html>
