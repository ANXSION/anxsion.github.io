<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyx Capital</title>
</head>

<style>
    body{
        min-width: 100%;
        min-height: 100vh;
        background-color: black;
        margin: 0;
        display: flex;
        flex-direction: row;
        justify-content: left;
        align-items: start;
        font-family: 'Roboto';
        color: white;
        font-size: 16px;
        line-height: 1.5;
    }
    nav{
        display: flex;
        position: fixed;
        width: 240px;
        height: 100vh;
        top: 0;
        left: 0;
        background-color: black;
    }
    .webNav{
        display: grid;
        grid-template-rows: 1fr 3fr;
    }
    .mobNav{
        display: none;
    }
    nav div{
        margin: 18px;
    }
    .mainContent{
        width: 100%;
        height: 100%;
        margin-left: 240px;
    }
    .mainContent div{
        margin: 54px;
    }
    p{
        font-size: 1rem;
    }
    h1,h2,h3,h4,h5,h6{
        font-weight: normal;
    }
    
    @media (max-width: 424px){
        p{
            font-size: 0.75rem;
        }
        nav{
            position: fixed;
            width: 100%;
            height: 72px;
            top: 0;
            left: 0;
            background-color: black;
            margin: 0;
        }
        .mainContent{
            width: 100%;
            height: 100%;
            margin-top: 72px;
            margin-left: auto;
        }
        .mainContent div{
            margin: 27px;
        }
        .webNav{
            display: none;
        }
        .mobNav{
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            margin: 0;
            padding-left: 27px;
        }
        .mobNav p{
            margin: 0;
        }
        
    }
</style>

<body>
    <nav>
        <div class="webNav">
            <div style="display: flex; align-items: center;">
                <p style="font-size: 1.7rem;">Nyx<br>Capital</p>
            </div>
            <div style="display: flex;  flex-direction: column;">
                <p style="margin: 0; margin-top: 9px; margin-bottom: 9px;">Portfolio Management</p>
                <p style="margin: 0; margin-top: 9px; margin-bottom: 9px;">Credit Assistance</p>
                <p style="margin: 0; margin-top: 9px; margin-bottom: 9px;">Trust and Real Estate</p>
                <p style="margin: 0; margin-top: 9px; margin-bottom: 9px;">Tax Planning</p>
                <p style="margin: 0; margin-top: 9px; margin-bottom: 9px;">Tools</p>
            </div>
        </div>
        <div class="mobNav">
            <p style="font-size: 1.5rem; text-align: center;">Nyx Capital</p>
        </div>
    </nav>
    
    <div class="mainContent">
        <div>
            <div style="min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;">
                <h1 style="text-align: center;">Unwavering Resolve.<br>Unparalleled Results.</h1>
            </div>
            <br><br><br><br>

            <h1>Economy at a Glance</h1>
            <!-- TradingView Widget BEGIN -->
<div class="tradingview-widget-container">

      {
        "description": "Inflation Rate",

      },
      {
        "description": "Imports",
        "proName": "ECONOMICS:INIMP"
      },
      {
        "description": "Exports",
        "proName": "ECONOMICS:INEXP"
      },
      {
        "description": "Lending Rate",
        "proName": "ECONOMICS:INBLR"

      {
        "description": "Interest Rate",
        "proName": "ECONOMICS:ININTR"

    "showSymbolLogo": true,

  <br><br><br><br>


  <h1>Stock Screener</h1>

<div style="margin: 0;" class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
    {
    "width": "100%",
    "height": "500",
    "defaultColumn": "overview",
    "defaultScreen": "most_capitalized",
    "market": "india",
    "showToolbar": true,
    "colorTheme": "dark",

    "isTransparent": true
  }

  </div>

  <br><br><br><br>

  <h1>Economic Calender</h1>

  <!-- TradingView Widget END -->

            <p style="display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 9px;">&copy; Nyx Capital</p>
        </div>
    </div>

</html>
